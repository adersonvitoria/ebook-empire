# Nixpacks build config para o monorepo pnpm "Ebook Empire".
# Build/deploy do servico apps/api (Fastify). O start sobe o server compilado.
# Mantem paridade com railway.json (NIXPACKS builder).

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# corepack (vem com o Node 20) instala o shim do pnpm no bin do Node, que esta
# no PATH — ao contrario de `npm i -g pnpm`, cujo prefixo global nao fica no PATH
# do shell de login do proximo RUN (causa de "pnpm: command not found").
cmds = [
  "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --frozen-lockfile --prod=false",
]

[phases.build]
cmds = [
  "pnpm --filter @ebook-empire/api run prisma:generate",
  # Builda a API E suas dependencias de workspace (core/adapters/agents) em ordem
  # topologica — o "..." inclui as deps. Sem isso, os dist/ de core/agents/adapters
  # nao existem e o runtime quebra com "Cannot find module @ebook-empire/agents".
  "pnpm --filter @ebook-empire/api... run build",
]

[start]
cmd = "node apps/api/dist/server.js"
